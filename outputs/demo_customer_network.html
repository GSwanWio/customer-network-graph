<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Demo Customer Network Graph</title>
	<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: #f7f7f7;
			color: #222;
		}

		.header {
			padding: 16px 20px;
			background: white;
			border-bottom: 1px solid #ddd;
		}

		.header h1 {
			margin: 0 0 6px 0;
			font-size: 20px;
		}

		.header p {
			margin: 0;
			font-size: 13px;
			color: #555;
		}

		.legend {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			padding: 10px 20px;
			background: white;
			border-bottom: 1px solid #ddd;
			font-size: 13px;
		}

		.legend-item {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.legend-dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			display: inline-block;
		}

		#network {
			width: 100vw;
			height: calc(100vh - 112px);
			background: #fafafa;
		}
	</style>
</head>
<body>
	<div class="header">
		<h1>Demo Customer Network Graph</h1>
		<p>Interactive combined customer relationship graph. Hover over nodes and edges for details. Drag nodes to rearrange the view.</p>
	</div>

	<div class="legend">
		<div class="legend-item"><span class="legend-dot" style="background:#d62728"></span>Original seed</div>
		<div class="legend-item"><span class="legend-dot" style="background:#ff7f0e"></span>Counterparty expansion start</div>
		<div class="legend-item"><span class="legend-dot" style="background:#1f77b4"></span>Linked customer/entity</div>
		<div class="legend-item"><span class="legend-dot" style="background:#9467bd"></span>Emirates ID connector</div>
		<div class="legend-item"><span class="legend-dot" style="background:#2ca02c"></span>Local counterparty account</div>
	</div>

	<div id="network"></div>

	<script>
		const nodes = new vis.DataSet([

  },
  {
    "id": "ENTITY|SME|CUST_3",

  },

    "group": "linked_entity"
  },

    "group": "local_counterparty_account"
  }
]);
		const edges = new vis.DataSet([

    "title": "Relationship: ENTITY_USES_LOCAL_COUNTERPARTY_ACCOUNT\\nLayer: LOCAL_COUNTERPARTY_CORE\\nRole: GROUP_FORMING\\nDirection: INBOUND_ONLY\\nTransaction count: 1\\nTransaction amount: 2000.0\\nFirst seen: 2026-01-02 11:00:00\\nLast seen: 2026-01-02 11:00:00",
    "group": "local_counterparty",
    "label": "Account"
  },
  {
    "from": "ENTITY|SME|CUST_3",
    "to": "LOCAL_COUNTERPARTY_ACCOUNT|7266EE5B3812D9C647CA459B3A040269EDD709A412F602D1714CF35E8E24C82B",

  },
  {
    "from": "ENTITY|SME|CUST_5",
    "to": "LOCAL_COUNTERPARTY_ACCOUNT|3395DBCB7506478D1F75DFDBC0F45CA8DC110CE4AD672CFCB2B96056D26F73D4",
    "title": "Relationship: ENTITY_USES_LOCAL_COUNTERPARTY_ACCOUNT\\nLayer: LOCAL_COUNTERPARTY_CORE\\nRole: GROUP_FORMING\\nDirection: INBOUND_ONLY\\nTransaction count: 1\\nTransaction amount: 400.0\\nFirst seen: 2026-01-06 15:00:00\\nLast seen: 2026-01-06 15:00:00",
    "group": "local_counterparty",
    "label": "Account"
  }
]);

		const container = document.getElementById("network");

		const data = {
			nodes: nodes,
			edges: edges
		};

		const options = {
			nodes: {
				shape: "dot",
				size: 22,
				font: {
					size: 14,
					face: "Arial"
				},
				borderWidth: 2
			},
			edges: {
				width: 2,
				smooth: {
					type: "continuous"
				},
				font: {
					size: 11,
					align: "middle"
				}
			},
			groups: {
				seed_entity: {
					color: {
						background: "#d62728",
						border: "#8c1d1d"
					},
					size: 30
				},
				counterparty_expansion_start: {
					color: {
						background: "#ff7f0e",
						border: "#a85108"
					},
					size: 28
				},
				linked_entity: {
					color: {
						background: "#1f77b4",

					}

				emirates_id: {
					color: {
						background: "#9467bd",

					shape: "diamond",

				},
				local_counterparty_account: {
					color: {
						background: "#2ca02c",
						border: "#1d6b1d"
					},
					shape: "square",
					size: 22
				}
			},
			physics: {
				enabled: true,
				solver: "forceAtlas2Based",
				forceAtlas2Based: {
					gravitationalConstant: -60,
					centralGravity: 0.01,
					springLength: 120,
					springConstant: 0.08
				},
				stabilization: {
					iterations: 200
				}
			},
			interaction: {
				hover: true,
				tooltipDelay: 150,
				navigationButtons: true,
				keyboard: true
			}
		};

		new vis.Network(container, data, options);
	</script>
</body>
</html>
