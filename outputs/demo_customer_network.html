		}

			margin: 0 0 6px 0;

		}

		.header p {
			margin: 0;
			font-size: 13px;
			color: #555;
		}

		.toolbar {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 10px;
			padding: 10px 20px;
			background: white;
			border-bottom: 1px solid #ddd;
		}

		.toolbar button {
			border: 1px solid #cbd5e1;
			background: #ffffff;
			color: #0f172a;
			border-radius: 10px;
			font-size: 13px;
			font-weight: 700;
			padding: 8px 12px;
			cursor: pointer;
		}

		.toolbar button:hover {
			background: #f1f5f9;
		}

		.toolbar .primary {
			background: #ef4444;
			color: white;
			border-color: #ef4444;
		}

		.toolbar .primary:hover {
			background: #dc2626;
		}

		.status {
			font-size: 12px;
			color: #64748b;
			margin-left: 4px;
		}

		.legend {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			padding: 10px 20px;
			background: white;
			border-bottom: 1px solid #ddd;
			font-size: 13px;
		}

		.legend-item {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.legend-dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			display: inline-block;
		}

		.canvas-wrapper {
			overflow: auto;
			height: calc(100vh - 166px);
			background: #fafafa;
		}

		svg {
			background: #fafafa;
			user-select: none;
		}

		.node {
			cursor: grab;
		}

		.node.dragging {
			cursor: grabbing;
		}

		.node-label {
			font-size: 13px;
			font-weight: 700;
			fill: #222;
			pointer-events: none;
		}

		.node-role {
			font-size: 9px;
			fill: #555;
			pointer-events: none;
		}

		.edge-label {
			font-size: 11px;
			fill: #555;
			font-weight: 700;
			paint-order: stroke;
			stroke: #fafafa;
			stroke-width: 4px;
			stroke-linejoin: round;
			pointer-events: none;
		}
	</style>
</head>
