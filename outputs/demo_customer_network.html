			padding: 16px 20px;
			background: white;
			border-bottom: 1px solid #ddd;
		}

		.header h1 {
			margin: 0 0 6px 0;
			font-size: 20px;
		}

		.header p {
			margin: 0;
			font-size: 13px;
			color: #555;

		.legend {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			padding: 10px 20px;
			background: white;
			border-bottom: 1px solid #ddd;
			font-size: 13px;
		}

		.legend-item {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.legend-dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			display: inline-block;
		}

		.canvas-wrapper {
			overflow: auto;
			height: calc(100vh - 116px);
			background: #fafafa;
		}

		svg {
			min-width: 100%;
			background: #fafafa;
		}

		.node-label {
			font-size: 13px;
			font-weight: 700;
			fill: #222;
		}

		.node-role {
			font-size: 9px;
			fill: #555;
		}

		.edge-label {
			font-size: 11px;
			fill: #555;
			font-weight: 700;
			paint-order: stroke;
			stroke: #fafafa;
			stroke-width: 4px;
			stroke-linejoin: round;
		}

		.node:hover,
		.edge:hover {
			cursor: pointer;
			filter: brightness(1.05);
		}
	</style>
</head>
